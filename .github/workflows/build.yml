name: build
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      build_type:
        type: choice
        description: "Build type"
        required: true
        default: debug
        options:
          - debug
          - nightly
          - release
      flavor:
        type: choice
        description: "Product flavor"
        required: true
        default: standalone
        options:
          - fdroid
          - standalone

env:
  UPLOAD_DIR_ANDROID: android_artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      KEY_STORE_FILE: 'android_keystore.jks'
      KEY_STORE_LOCATION: ${{ github.workspace }}/app/keystore/
    outputs:
      UPLOAD_DIR_ANDROID: ${{ env.UPLOAD_DIR_ANDROID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: ${{ github.event.inputs.build_type != 'debug' }}
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: ${{ env.KEY_STORE_FILE }}
          fileDir: ${{ env.KEY_STORE_LOCATION }}
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Create keystore path env var
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: |
          store_path=${{ env.KEY_STORE_LOCATION }}${{ env.KEY_STORE_FILE }}
          echo "KEY_STORE_PATH=$store_path" >> $GITHUB_ENV

      - name: Build APK
        run: |
          flavor=${{ github.event.inputs.flavor }}
          build_type=${{ github.event.inputs.build_type }}
          case $build_type in
            "release")
              ./gradlew :app:assemble${flavor^}Release --info
              ;;
            "nightly")
              ./gradlew :app:assemble${flavor^}Nightly --info
              ;;
            "debug")
              ./gradlew :app:assemble${flavor^}Debug --stacktrace
              ;;
          esac

      - name: Get APK path
        id: apk-path
        run: |
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_artifacts_${{ github.event.inputs.flavor }}_${{ github.event.inputs.build_type }}
          path: ${{ steps.apk-path.outputs.path }}

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.6-${{ github.run_number }}
          name: Release 1.0.6 (Build ${{ github.run_number }})
          files: ${{ steps.apk-path.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
